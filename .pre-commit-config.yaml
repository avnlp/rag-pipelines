fail_fast: true
exclude: '^(src/rag_pipelines/baml_client/|src/rag_pipelines/baml_src/)'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    - id: trailing-whitespace
    - id: check-ast
    - id: check-builtin-literals
    - id: check-docstring-first
    - id: check-executables-have-shebangs
    - id: debug-statements
    - id: end-of-file-fixer
    - id: mixed-line-ending
      args: [--fix=lf]
    - id: fix-byte-order-marker
    - id: check-merge-conflict
    - id: check-symlinks
    - id: detect-private-key
    - id: check-yaml
      args: [--unsafe]
    - id: check-toml

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 'v0.15.13'
    hooks:
    - id: ruff-check
      args: [--fix, --unsafe-fixes, --exit-non-zero-on-fix]
      types_or: [python, jupyter]
    - id: ruff-format
      types_or: [python, jupyter]

  - repo: https://github.com/PyCQA/bandit
    rev: "1.9.4"
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml", "-r", "--severity-level", "high", "--confidence-level", "high", "--exit-zero", "src/"]
        additional_dependencies: ["bandit[toml]"]

  - repo: local
    hooks:
    - id: ty
      name: ty
      entry: uv run ty check src/ tests
      language: system
      types: [python]
      pass_filenames: false

  - repo: https://github.com/crate-ci/typos
    rev: v1.46.2
    hooks:
      - id: typos

  - repo: local
    hooks:
    - id: pytest
      name: pytest
      entry: python3 -m pytest -m "not integration_test"
      language: system
      pass_filenames: false
      always_run: true

ci:
  autofix_prs: true
  autofix_commit_msg: "ci: Auto fixes from pre-commit"
  autofix_prs_limit: 5
  autoupdate_schedule: monthly
  autoupdate_commit_msg: "ci: Pre-commit autoupdate"
  skip: [ty, pytest]
